<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Kua Company — Chat Widget Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #faf6ef;
      color: #3a2c20;
    }

    .demo-page {
      max-width: 640px;
      margin: 60px auto;
      padding: 0 24px;
    }

    .demo-page h1 {
      color: #8a4b1f;
    }
  </style>
</head>
<body>
  <main class="demo-page">
    <h1>The Kua Company</h1>
    <p>This page simulates thekuacompany.com. The chat widget in the bottom-right corner is what will eventually be embedded via the WordPress plugin.</p>
  </main>

  <div id="chat-widget">
    <div id="chat-teaser" class="chat-teaser hidden" role="status">
      <span>May I help you?</span>
      <button id="chat-teaser-close" type="button" aria-label="Dismiss">
        <svg aria-hidden="true" viewBox="0 0 24 24" fill="none">
          <path d="M18 6 6 18" />
          <path d="m6 6 12 12" />
        </svg>
      </button>
    </div>

    <button id="chat-toggle" type="button" aria-label="Open chat">
      <svg class="chat-toggle-icon" aria-hidden="true" viewBox="0 0 24 24" fill="none">
        <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4v8Z" />
        <path d="M8 9h8" />
        <path d="M8 13h5" />
      </svg>
    </button>

    <div id="chat-panel" class="hidden">
      <div class="chat-header">
        <div class="chat-tabs">
          <button class="tab-btn active" type="button" data-mode="chat">Support</button>
          <button class="tab-btn" type="button" data-mode="recipes">Recipe Ideas</button>
        </div>
        <button id="chat-close" type="button" aria-label="Close chat">
          <svg aria-hidden="true" viewBox="0 0 24 24" fill="none">
            <path d="M18 6 6 18" />
            <path d="m6 6 12 12" />
          </svg>
        </button>
      </div>

      <div id="chat-messages" class="chat-messages"></div>

      <form id="chat-form" class="chat-input-row">
        <input id="chat-input" type="text" placeholder="Type a message..." autocomplete="off" />
        <button type="submit">Send</button>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
